# InitBox profile for Radxa Cubie A5E

PROFILE_ID="radxa-cubie-a5e"
PROFILE_NAME="Radxa Cubie A5E"
OWNER="initbox"
HOSTNAME_DEFAULT="cubie-a5e"
PRIMARY_MANAGEMENT_INTERFACE="dashboard"

# Keep A5E base first. Dashboard is React UI, not Node-RED.
DEFAULT_MODULES="a5e hotspot dashboard isi ws-br0 rtc"

HOTSPOT_INTERFACE="wlan0"
HOTSPOT_CIDR="192.168.30.1/24"
HOTSPOT_DHCP_START="192.168.30.10"
HOTSPOT_DHCP_END="192.168.30.30"
HOTSPOT_HOSTNAME="initbox.wlan"
DASHBOARD_PORT="8080"
DASHBOARD_API_PORT="8090"
TERMINAL_PORT="7681"
TRACE_DIR="/usr/tracefiles"
